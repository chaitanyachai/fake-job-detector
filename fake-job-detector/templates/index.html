<!DOCTYPE html>
<html>
<head>
    <title>Fake Job Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navigation Bar -->
        <nav>
            <a href="/">Home</a> |
            <a href="/history">History</a>
        </nav>

        <h1>Fake Job Detector</h1>

        <!-- Job description form -->
        <form method="POST">
            <textarea name="job_desc" placeholder="Paste job description here..." required></textarea><br>
            <button type="submit">Analyze</button>
        </form>

        <!-- Result display -->
        {% if result %}
            <div class="alert {{ result|lower }}">
                <p><strong>Result:</strong> {{ result }}</p>
                {% if keyword %}
                    <p><strong>Flagged keyword:</strong> {{ keyword }}</p>
                {% endif %}
            </div>
        {% endif %}
    </div>
</body>
</html>
